  /v1/invoices/{invoice_code}/pay-overdue:
    post:
      tags: [Faturas]
      summary: Pagar fatura em atraso
      description: >
        Realiza o pagamento de uma fatura em atraso de uma assinatura.
        A fatura precisa estar em status `Pending` ou `Fail` e a assinatura precisa estar ativa.
        Cancela todas as cobranças pendentes anteriores antes de criar uma nova.
        Aceita qualquer método de pagamento: `CreditCard`, `PIX`.
        Ao usar `CreditCard`, o objeto `card` com os dados do cartão é obrigatório.
        Esta rota NÃO retorna o envelope APIReturnUtil no sucesso; retorna diretamente os dados da cobrança.
      operationId: payOverdueInvoice
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
        - name: invoice_code
          in: path
          required: true
          description: Código único da fatura (pedido)
          schema:
            type: string
            example: "ord_xyz456"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PayOverdueInvoiceRequest'
            examples:
              cartao:
                summary: Pagar com Cartão de Crédito
                value:
                  method: CreditCard
                  card:
                    name: "CARLOS FERREIRA"
                    number: "4111111111111111"
                    month: "12"
                    year: "28"
                    security_code: "321"
              pix:
                summary: Pagar com PIX
                value:
                  method: PIX
      responses:
        '200':
          description: Cobrança criada e processada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PayOverdueInvoiceResponse'
              examples:
                credit_card:
                  summary: Pagamento com cartão de crédito
                  value:
                    invoice_code: "ord_xyz456"
                    code: "chg_abc123"
                    status: "Paid"
                    amount: 9990
                    canceled_amount: 0
                    installments: 1
                    payment:
                      type: "CreditCard"
                      card:
                        id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                pix:
                  summary: Pagamento com PIX
                  value:
                    invoice_code: "ord_xyz456"
                    code: "chg_abc123"
                    status: "Pending"
                    amount: 9990
                    canceled_amount: 0
                    installments: 1
                    payment:
                      type: "PIX"
                      pix:
                        qrcode_url: "https://api.example.com/pix/qrcode"
                        copy_paste: "00020101021226..."
                        expiration: "2026-03-11T10:30:00.000000Z"
        '400':
          description: Fatura não está pendente ou não pertence a uma assinatura
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                not_pending:
                  summary: Fatura não está pendente
                  value:
                    mensagem: "Um erro inesperado acabou de acontecer."
                    erro: true
                    mensagenserro:
                      - "Fatura não está pendente"
                    codigoretorno: 400
                    id: "00000000-0000-0000-0000-000000000000"
                    data: []
                not_subscription:
                  summary: Compra não é uma assinatura
                  value:
                    mensagem: "Um erro inesperado acabou de acontecer."
                    erro: true
                    mensagenserro:
                      - "A compra não é uma assinatura válida"
                    codigoretorno: 400
                    id: "00000000-0000-0000-0000-000000000000"
                    data: []
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Fatura não encontrada ou não pertence à conta
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                mensagem: "Um erro inesperado acabou de acontecer."
                erro: true
                mensagenserro:
