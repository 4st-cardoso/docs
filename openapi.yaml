              type: integer
              example: 2

    # ── Push Notifications ────────────────────────────────────────

    SendPushNotificationRequest:
      type: object
      required: [title, body]
      properties:
        title:
          type: string
          description: Título da notificação (obrigatório)
          example: "Novo pedido recebido!"
        body:
          type: string
          description: Corpo da notificação (obrigatório)
          example: "Você tem um novo pedido no valor de R$ 199,90"
        data:
          type: object
          nullable: true
          description: Dados adicionais em formato livre (opcional)
          example:
            order_code: "ord_abc123xyz"
            type: "new_order"

    AddDeviceRequest:
      type: object
      required: [device_token]
      properties:
        device_token:
          type: string
          description: Token do dispositivo para push (obrigatório)
          example: "ExponentPushToken[xxxxxxxxxxxxxxxxxxxxxx]"
        platform:
          type: string
          nullable: true
          description: Plataforma do dispositivo (opcional)
          enum: [ios, android]
          example: ios

    PushNotificationsResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                example: "notif_001"
              title:
                type: string
                example: "Novo pedido recebido!"
              body:
                type: string
                example: "Você tem um novo pedido no valor de R$ 199,90"
              read:
                type: boolean
                example: false
              created_at:
                type: string
                format: date-time
                example: "2026-03-11T10:00:00.000000Z"

    # ── Utilitários ───────────────────────────────────────────────

    TimeZonesResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            type: object
            properties:
              value:
                type: string
                description: Identificador do fuso horário
                example: "America/Sao_Paulo"
              label:
                type: string
                description: Nome legível do fuso horário
                example: "America/Sao_Paulo (UTC-03:00)"

    # ── Gestão ───────────────────────────────────────────────────

    SalesReportResponse:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              account_code:
                type: string
                example: "acc_abc123"
              account_name:
                type: string
                example: "Minha Loja"
              total_revenue:
                type: number
                format: float
                example: 15420.50
              total_orders:
                type: integer
                example: 87
              approved_orders:
                type: integer
                example: 72
              declined_orders:
                type: integer
                example: 8
              period:
                type: object
                properties:
                  start_date:
                    type: string
                    format: date
                    example: "2026-01-01"
                  end_date:
                    type: string
                    format: date
                    example: "2026-03-31"
        current_page:
          type: integer
          example: 1
        last_page:
          type: integer
          example: 1
        total:
          type: integer
          example: 5

    # ── Respostas genéricas (formato APIReturnUtil) ─────────────────

    APIBaseResponse:
      type: object
      description: >
        Formato padrão de resposta da API. Todas as respostas (exceto listagens paginadas)
        seguem este envelope.
      properties:
        mensagem:
          type: string
          description: Mensagem descritiva da operação
        erro:
          type: boolean
          description: Indica se houve erro (false = sucesso)
        mensagenserro:
          type: array
          items:
            type: string
          description: Lista de mensagens de erro detalhadas (vazia em caso de sucesso)
        codigoretorno:
          type: integer
          description: Código HTTP de retorno
        id:
          type: string
          description: ID do recurso criado/afetado ou GUID vazio
        data:
          description: Dados retornados pela operação (objeto, array ou vazio)

    SuccessResponse:
      type: object
      properties:
        mensagem:
          type: string
          example: "Operação realizada com sucesso"
        erro:
          type: boolean
          example: false
        mensagenserro:
          type: array
          items:
            type: string
          example: []
        codigoretorno:
          type: integer
          example: 200
        id:
          type: string
          example: "00000000-0000-0000-0000-000000000000"
        data:
          description: Dados retornados pela operação (objeto, array ou vazio)
          nullable: true

    ErrorResponse:
      type: object
      properties:
        mensagem:
          type: string
          example: "Um erro inesperado acabou de acontecer."
        erro:
          type: boolean
          example: true
        mensagenserro:
          type: array
          items:
            type: string
          example:
            - "Detalhe do erro ocorrido."
        codigoretorno:
          type: integer
          example: 400
        id:
          type: string
          example: "00000000-0000-0000-0000-000000000000"
        data:
          type: array
          example: []

    ValidationErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: "The given data was invalid."
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          example:
            "client.email":
              - "O campo client.email é obrigatório."
            "payment.type":
              - "O campo payment.type é obrigatório."

    # ── Respostas de Listas ───────────────────────────────────────

    AccountsListResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: '#/components/schemas/AccountItem'

    AccountDetailResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/AccountItem'

    BlockedClientsListResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Clientes bloqueados encontrados com sucesso"
        data:
          type: object
          properties:
            current_page:
              type: integer
              example: 1
            data:
              type: array
              items:
                $ref: '#/components/schemas/BlockedClientItem'
            last_page:
              type: integer
              example: 2
            per_page:
              type: integer
              example: 15
            total:
              type: integer
              example: 23

    UserPreferencesResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          description: Preferências do usuário (estrutura livre)
          example:
            theme: "dark"
            language: "pt-BR"
            notifications_enabled: true

    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
          description: Novo nome do usuário (opcional)
          example: "João Silva Atualizado"
        email:
          type: string
          format: email
          description: Novo e-mail do usuário (opcional)
          example: "joao.novo@exemplo.com.br"
        path_avatar:
          type: string
          nullable: true
          description: Caminho do novo avatar (opcional)
          example: "avatars/joao_novo.jpg"
        zipcode:
          type: string
          description: CEP do endereço (opcional)
          example: "01310-100"
        street:
          type: string
          description: Logradouro (opcional)
          example: "Avenida Paulista"
        number:
          type: string
          description: Número do endereço (opcional)
          example: "1000"
        complement:
          type: string
          description: Complemento (opcional)
          example: "Apto 42"
        neighborhood:
          type: string
          description: Bairro (opcional)
          example: "Bela Vista"
        city:
          type: string
          description: Cidade (opcional)
          example: "São Paulo"
        state:
          type: string
          description: Estado UF (opcional)
          example: "SP"
        country:
          type: string
          description: País (opcional)
          example: "Brasil"
        default:
          type: string
          description: Código da conta padrão do usuário (opcional)
          example: "acc_abc123"

    # ─── Webhook Endpoints ───────────────────────────────────────────

    WebhookEndpointItem:
      type: object
      properties:
        id:
          type: integer
          example: 42
        url:
          type: string
          format: uri
          example: "https://meusite.com.br/webhook"
        events:
          type: array
          items:
            type: string
          example: ["order.paid", "charge.failed"]
        status:
          type: string
          enum: [Ativo, Inativo]
          example: "Ativo"
        created_at:
          type: string
          format: date-time
          example: "2026-03-01T10:00:00.000000Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-03-10T15:30:00.000000Z"

    WebhookEndpointListResponse:
      type: object
      properties:
        mensagem:
          type: string
          example: "Webhooks encontrados com sucesso"
        erro:
          type: boolean
          example: false
        mensagenserro:
          type: array
          items:
            type: string
        codigoretorno:
          type: integer
          example: 200
        id:
          type: string
          example: "00000000-0000-0000-0000-000000000000"
        data:
          type: array
          items:
            $ref: '#/components/schemas/WebhookEndpointItem'

    WebhookEndpointCreateRequest:
      type: object
      required:
        - url
        - events
      properties:
        url:
          type: string
          format: uri
          description: URL que receberá as notificações via POST
          example: "https://meusite.com.br/webhook"
        events:
          type: array
          minItems: 1
          description: >
            Lista de eventos a monitorar. Valores aceitos:
            `welcome`, `email.confirmation`, `email.recovery`,
            `account.bank.update`, `account.team.invite`,
            `order.paid`, `order.failed`, `order.refunded`, `order.challenged`, `order.unprocessed`, `order.chargeback`,
            `pix.generated`,
            `charge.created`, `charge.pending`, `charge.paid`, `charge.failed`, `charge.reproved`,
            `charge.refunded`, `charge.partial_refunded`, `charge.expired`, `charge.canceled`, `charge.challenged`, `charge.chargeback`,
            `withdrawal.requested`,
            `purchase.many_failed`,
            `subscription.canceled`, `subscription.delayed`, `subscription.regularized`,
            `invoice.created`, `invoice.paid`, `invoice.failed`
          items:
            type: string
            enum:
              - welcome
              - email.confirmation
              - email.recovery
              - account.bank.update
              - account.team.invite
              - order.paid
              - order.failed
              - order.refunded
              - order.challenged
              - order.unprocessed
              - order.chargeback
              - pix.generated
              - charge.created
              - charge.pending
              - charge.paid
              - charge.failed
              - charge.reproved
              - charge.refunded
              - charge.partial_refunded
              - charge.expired
              - charge.canceled
              - charge.challenged
              - charge.chargeback
              - withdrawal.requested
              - purchase.many_failed
              - subscription.canceled
              - subscription.delayed
              - subscription.regularized
              - invoice.created
              - invoice.paid
              - invoice.failed
          example: ["order.paid", "charge.failed"]

    WebhookEndpointUpdateRequest:
      type: object
      properties:
        url:
          type: string
          format: uri
          description: Nova URL do webhook (opcional)
          example: "https://novo-site.com.br/webhook"
        events:
          type: array
          minItems: 1
          description: Nova lista de eventos (opcional)
          items:
            type: string
            enum:
              - welcome
              - email.confirmation
              - email.recovery
              - account.bank.update
              - account.team.invite
              - order.paid
              - order.failed
              - order.refunded
              - order.challenged
              - order.unprocessed
              - order.chargeback
              - pix.generated
              - charge.created
              - charge.pending
              - charge.paid
              - charge.failed
              - charge.reproved
              - charge.refunded
              - charge.partial_refunded
              - charge.expired
              - charge.canceled
              - charge.challenged
              - charge.chargeback
              - withdrawal.requested
              - purchase.many_failed
              - subscription.canceled
              - subscription.delayed
              - subscription.regularized
              - invoice.created
              - invoice.paid
              - invoice.failed
          example: ["order.paid", "invoice.created"]
        status:
          type: string
          enum: [Ativo, Inativo]
          description: Status do webhook (opcional)
          example: "Ativo"
