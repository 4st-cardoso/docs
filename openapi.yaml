openapi: 3.1.0
info:
  title: 4Selet Pay API
  description: >
    API de processamento de pagamentos da plataforma 4Selet Pay.
    Suporta cobranças únicas, assinaturas recorrentes, PIX, Cartão de Crédito.
    Todas as rotas autenticadas requerem um Bearer Token obtido via `/v1/login`.
  version: 1.0.0
  contact:
    name: 4Selet Pay
    email: suporte@4selet.com.br

servers:
  - url: https://hml.4seletpay.com.br/api
    description: Servidor de Produção

security:
  - bearerAuth: []

tags:
  - name: Autenticação
    description: Rotas de autenticação e criação de usuários
  - name: Cobranças
    description: Criação, consulta, cancelamento e reembolso de cobranças
  - name: Pedidos
    description: Consulta de pedidos e gerenciamento de confirmações desafiadas
  - name: Assinaturas
    description: Criação e gerenciamento de assinaturas recorrentes
  - name: Faturas
    description: Gerenciamento de faturas e pagamento de faturas em atraso
  - name: Clientes Bloqueados
    description: Gerenciamento de lista negra de clientes
  - name: Contas
    description: Criação e gerenciamento de contas na plataforma
  - name: Aplicativo
    description: Endpoints para dashboard e uso via aplicativo mobile
  - name: Notificações Push
    description: Envio e gerenciamento de notificações push
  - name: Utilitários
    description: Endpoints utilitários como listagem de fusos horários
  - name: Gestão
    description: Relatórios gerenciais (acesso restrito a Super Admins)
  - name: Webhooks
    description: Endpoints para receber notificações de gateways de pagamento
  - name: Endpoints de Webhook
    description: Gerenciamento de endpoints de webhook para receber notificações de eventos da plataforma

paths:

  # ─────────────────────────────────────────────────────────────────
  # AUTENTICAÇÃO
  # ─────────────────────────────────────────────────────────────────

  /v1/check:
    get:
      tags: [Autenticação]
      summary: Verificar status da API
      description: Retorna uma mensagem confirmando que a API está em funcionamento. Útil para health checks.
      operationId: healthCheck
      security: []
      responses:
        '200':
          description: API em funcionamento
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: API is running
              example:
                message: API is running

  /v1/login:
    post:
      tags: [Autenticação]
      summary: Realizar login
      description: >
        Autentica o usuário com email e senha e retorna um Bearer Token para uso nas demais rotas.
        O token tem prazo de expiração informado na resposta.
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: usuario@exemplo.com.br
              password: "suaSenha123"
      responses:
        '200':
          description: Login realizado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              example:
                access_token: "eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiJ9..."
                token_type: Bearer
                expires_at: "2026-04-11T12:00:00.000000Z"
        '401':
          description: Credenciais inválidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                message: Invalid Credentials
        '422':
          $ref: '#/components/responses/ValidationError'

  # ─────────────────────────────────────────────────────────────────
  # COBRANÇAS
  # ─────────────────────────────────────────────────────────────────

  /v1/charge:
    post:
      tags: [Cobranças]
      summary: Criar cobrança
      description: >
        Cria uma nova cobrança (pedido de pagamento). Suporta os métodos de pagamento:
        **CreditCard**, **PIX**.
        Requer o header `account` com o código da conta.
        Passa por validações de fraude, bloqueio de clientes e rate limiting.


        Possíveis cenários de resposta:

        - **201** — Cobrança processada com sucesso (aprovada ou aguardando pagamento PIX)

        - **202** — Transação desafiada (requer confirmação adicional via OTP)

        - **400** — Fraude detectada ou erro no processamento do gateway

        - **422** — Erro de validação dos dados enviados
      operationId: createCharge
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutRequest'
            examples:
              cartao_credito:
                summary: Pagamento com Cartão de Crédito
                value:
                  international: false
                  client:
                    name: "João Silva"
                    email: "joao@exemplo.com.br"
                    gender: "Male"
                    birthdate: "1990-01-15"
                    phone:
                      ddi: "55"
                      ddd: "11"
                      number: "999999999"
                    document:
                      type: "CPF"
                      number: "123.456.789-09"
                    address:
                      zipcode: "01310-100"
                      street: "Avenida Paulista"
                      number: 1000
                      neighborhood: "Bela Vista"
                      complement: "Apto 42"
                      city: "São Paulo"
                      state: "SP"
                      country: "Brasil"
                  payment:
                    type: CreditCard
                    card:
                      number: "4111111111111111"
                      name: "JOAO SILVA"
                      month: "12"
                      year: "27"
                      security_code: "123"
                      installments: 1
                      soft_descriptor: "MINHA LOJA"
                  items:
                    - id: "produto_001"
                      description: "Camiseta Premium"
                      amount: 99.90
                      quantity: 2
              pix:
                summary: Pagamento com PIX
                value:
                  international: false
                  client:
                    name: "Maria Santos"
                    email: "maria@exemplo.com.br"
                    phone:
                      ddi: "55"
                      ddd: "21"
                      number: "988887777"
                    document:
                      type: "CPF"
                      number: "987.654.321-00"
                  payment:
                    type: PIX
                    pix_expiration: 3600
                  items:
                    - id: "curso_001"
                      description: "Curso Online"
                      amount: 297.00
                      quantity: 1
      responses:
        '201':
          description: Cobrança processada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChargeCreateResponse'
              example:
                mensagem: "Cobrança realizada com sucesso."
                erro: false
                mensagenserro: []
                codigoretorno: 201
                id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                data:
                  charge_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                  charge_created_at: "11/03/2026 10:00:00"
                  account_id: 1
                  code: "pur_abc123xyz"
                  value: 199.80
                  charge_value: 199.80
                  coin: "BRL"
                  status: "Approved"
                  client:
                    code: "cli_abc123"
                    name: "João Silva"
                    email: "joao@exemplo.com.br"
                  orders:
                    - code: "ord_abc123xyz"
                      status: "Approved"
                      value: 199.80
                      charges:
                        - code: "chg_abc123"
                          status: "Approved"
                          value: 199.80
                          installments: 1
                          payment:
                            payment_type: "CreditCard"
                            installments: 1
        '202':
          description: Transação desafiada — requer confirmação adicional (OTP)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChargeCreateResponse'
              example:
                mensagem: "A transação necessita de confirmação..."
                erro: false
                mensagenserro: []
                codigoretorno: 202
                id: "00000000-0000-0000-0000-000000000000"
                data:
                  charge_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                  status: "Challenged"
                  orders:
                    - code: "ord_abc123xyz"
                      status: "Challenged"
                      confirmation_codes:
                        - id: "conf_xyz789"
                          type: "OTP"
                          status: "Pending"
                          expires_at: "2026-03-11T10:15:00.000000Z"
        '400':
          description: Fraude detectada ou erro no gateway
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                mensagem: "Não foi possível concluir sua transação."
                erro: true
                mensagenserro:
                  - "Verifique as informações e tente novamente."
                codigoretorno: 400
                id: "00000000-0000-0000-0000-000000000000"
                data: []
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/ServerError'

    get:
      tags: [Cobranças]
      summary: Listar cobranças
      description: >
        Retorna a lista paginada de cobranças da conta informada no header `account`.
        A resposta segue o formato padrão de paginação do Laravel (não é envelopada pelo formato APIReturnUtil).
      operationId: listCharges
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
        - name: page
          in: query
          required: false
          description: Número da página (gerenciado automaticamente pelo paginador Laravel)
          schema:
            type: integer
            default: 1
            example: 1
        - name: per_page
          in: query
          required: false
          description: Quantidade de itens por página
          schema:
            type: integer
            default: 10
            example: 10
        - name: search
          in: query
          required: false
          description: Texto para busca nos campos da listagem
          schema:
            type: string
            example: "joao"
        - name: id
          in: query
          required: false
          description: Filtrar por ID específico da cobrança
          schema:
            type: string
            example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        - name: with_trashed
          in: query
          required: false
          description: Incluir registros soft-deleted (1 = sim, 0 = não)
          schema:
            type: integer
            enum: [0, 1]
            default: 0
            example: 0
        - name: trashed_only
          in: query
          required: false
          description: Retornar apenas registros soft-deleted (1 = sim, 0 = não)
          schema:
            type: integer
            enum: [0, 1]
            default: 0
            example: 0
      responses:
        '200':
          description: Lista de cobranças retornada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedChargesResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/charge/{code}:
    get:
      tags: [Cobranças]
      summary: Consultar cobrança
      description: >
        Retorna os detalhes completos de uma cobrança específica pelo seu código.
        Os dados são cacheados para melhor performance.
      operationId: getCharge
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
        - name: code
          in: path
          required: true
          description: Código único da cobrança
          schema:
            type: string
            example: "chg_abc123"
      responses:
        '200':
          description: Dados da cobrança retornados com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChargeConsultResponse'
              example:
                mensagem: "Charge found"
                erro: false
                mensagenserro: []
                codigoretorno: 200
                id: "00000000-0000-0000-0000-000000000000"
                data:
                  charge_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                  charge_created_at: "11/03/2026 10:00:00"
                  account_id: 1
                  code: "pur_abc123xyz"
                  value: 199.80
                  charge_value: 199.80
                  coin: "BRL"
                  status: "Approved"
                  client:
                    code: "cli_abc123"
                    name: "João Silva"
                    email: "joao@exemplo.com.br"
                    documents:
                      - type: "CPF"
                        number: "123.456.789-09"
                        default: true
                    phone:
                      - ddi: "55"
                        ddd: "11"
                        number: "999999999"
                        default: true
                    addresss:
                      - zipcode: "01310-100"
                        street: "Avenida Paulista"
                        number: "1000"
                        neighborhood: "Bela Vista"
                        city: "São Paulo"
                        state: "SP"
                  orders:
                    - code: "ord_abc123xyz"
                      status: "Approved"
                      value: 199.80
                      error_message: null
                      items:
                        - code: "produto_001"
                          name: "Camiseta Premium"
                          unitary_value: 99.90
                          quantity: 2
                      charges:
                        - code: "chg_abc123"
                          status: "Approved"
                          value: 199.80
                          canceled_amount: 0
                          nsu: "123456789"
                          installments: 1
                          attempts: 1
                          payment:
                            code: null
                            copy_paste: null
                            expiration: null
                            payment_type: "CreditCard"
                            installments: 1
                          last_transaction:
                            transaction_id: "txn_abc123"
                            type: "Authorization"
                            status_code: "00"
                            nsu: "123456789"
                            event_date: "2026-03-11T10:00:00.000000Z"
                            message_acquisition: "Transação autorizada"
                          historics: []
                          card:
                            id: "card_abc123"
                            name: "JOAO SILVA"
                            type: "credit"
                            number: "411111****1111"
                            flag: "visa"
                      confirmation_codes: []
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/charge/cancel/{code}:
    post:
      tags: [Cobranças]
      summary: Cancelar cobrança
      description: >
        Cancela uma cobrança existente que ainda não foi finalizada.
        Esta rota não aceita body — apenas o código da cobrança no path.
      operationId: cancelCharge
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
        - name: code
          in: path
          required: true
          description: Código único da cobrança a ser cancelada
          schema:
            type: string
            example: "chg_abc123"
      responses:
        '200':
          description: Cobrança cancelada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              example:
                mensagem: "Charge chg_abc123 successfully canceled"
                erro: false
                mensagenserro: []
                codigoretorno: 200
                id: "00000000-0000-0000-0000-000000000000"
                data: []
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/charge/refund/{code}:
    post:
      tags: [Cobranças]
      summary: Estornar cobrança
      description: >
        Realiza o estorno (reembolso) de uma cobrança aprovada.
        O campo `value` no body é opcional; se não informado, o estorno é total.
        O valor deve ser enviado em **centavos**.
      operationId: refundCharge
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
        - name: code
          in: path
          required: true
          description: Código único da cobrança a ser estornada
          schema:
            type: string
            example: "chg_abc123"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                value:
                  type: integer
                  description: >
                    Valor a ser estornado em centavos (opcional).
                    Se omitido, o estorno é total.
                    Ex: para estornar R$ 50,00, envie 5000.
                  example: 5000
            example:
              value: 5000
      responses:
        '200':
          description: Estorno realizado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              example:
                mensagem: "Cobrança chg_abc123 estornada com sucesso"
                erro: false
                mensagenserro: []
                codigoretorno: 200
                id: "00000000-0000-0000-0000-000000000000"
                data: []
        '400':
          description: Erro no estorno (cobrança já estornada ou valor excede o disponível)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                ja_estornada:
                  summary: Cobrança já estornada por completo
                  value:
                    mensagem: "Um erro inesperado acabou de acontecer."
                    erro: true
                    mensagenserro: []
                    codigoretorno: 400
                    id: "00000000-0000-0000-0000-000000000000"
                    data: []
                valor_excede:
                  summary: Valor excede o disponível para estorno
                  value:
                    mensagem: "Um erro inesperado acabou de acontecer."
                    erro: true
                    mensagenserro: []
                    codigoretorno: 400
                    id: "00000000-0000-0000-0000-000000000000"
                    data: []
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ─────────────────────────────────────────────────────────────────
  # PEDIDOS
  # ─────────────────────────────────────────────────────────────────

  /v1/orders/{order_code}/confirmations:
    get:
      tags: [Pedidos]
      summary: Listar confirmações do pedido
      description: >
        Retorna a lista de confirmações (desafios de segurança) associadas a um pedido,
        ordenadas por data de criação (mais recente primeiro).
        Usado quando um pedido entra no status **Challenged** e requer verificação adicional (ex: OTP).
        Esta rota NÃO retorna o envelope padrão APIReturnUtil; retorna diretamente `{"data": [...]}`.
      operationId: getOrderConfirmations
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
        - name: order_code
          in: path
          required: true
          description: Código único do pedido
          schema:
            type: string
            example: "ord_abc123xyz"
      responses:
        '200':
          description: Lista de confirmações retornada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderConfirmationsResponse'
              example:
                data:
                  - id: "d5e6f7a8-b9c0-1234-5678-abcdef012345"
                    type: "otp"
                    status: "pending"
                    expires_at: "2026-03-11T10:15:00.000000Z"
        '400':
          description: Pedido não encontrado ou não pertence à conta
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                mensagem: "Um erro inesperado acabou de acontecer."
                erro: true
                mensagenserro:
                  - "Pedido não encontrado."
                codigoretorno: 400
                id: "00000000-0000-0000-0000-000000000000"
                data: []
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/orders/{order_code}/confirmations/{confirmation_id}/verify:
    post:
      tags: [Pedidos]
      summary: Verificar confirmação do pedido
      description: >
        Verifica/valida uma confirmação de pedido desafiado submetendo o código OTP recebido pelo cliente.
        Ao confirmar com sucesso, as cobranças pendentes do pedido são processadas.
        A resposta segue o mesmo formato da criação de cobrança (envelope APIReturnUtil com dados de consulta).
      operationId: verifyOrderConfirmation
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
        - name: order_code
          in: path
          required: true
          description: Código único do pedido
          schema:
            type: string
            example: "ord_abc123xyz"
        - name: confirmation_id
          in: path
          required: true
          description: ID (UUID) da confirmação a ser verificada
          schema:
            type: string
            format: uuid
            example: "d5e6f7a8-b9c0-1234-5678-abcdef012345"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                  description: Código de verificação OTP recebido pelo cliente
                  example: "123456"
            example:
              code: "123456"
      responses:
        '201':
          description: Cobrança processada com sucesso após confirmação
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChargeCreateResponse'
        '400':
          description: >
            Erro de validação, pedido não encontrado, confirmação inválida,
            pedido não está em status Challenged, ou erro no processamento da cobrança.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                validation_error:
                  summary: Erro de validação (code ausente)
                  value:
                    mensagem: "Um erro inesperado acabou de acontecer."
                    erro: true
                    mensagenserro:
                      - "O campo code é obrigatório."
                    codigoretorno: 400
                    id: "00000000-0000-0000-0000-000000000000"
                    data: []
                order_not_found:
                  summary: Pedido não encontrado
                  value:
                    mensagem: "Um erro inesperado acabou de acontecer."
                    erro: true
                    mensagenserro:
                      - "Pedido não encontrado."
                    codigoretorno: 400
                    id: "00000000-0000-0000-0000-000000000000"
                    data: []
                confirmation_not_found:
                  summary: Confirmação não encontrada ou código inválido
                  value:
                    mensagem: "Um erro inesperado acabou de acontecer."
                    erro: true
                    mensagenserro:
                      - "Confirmação não encontrada."
                    codigoretorno: 400
                    id: "00000000-0000-0000-0000-000000000000"
                    data: []
                not_challenged:
                  summary: Pedido não está aguardando confirmação
                  value:
                    mensagem: "Um erro inesperado acabou de acontecer."
                    erro: true
                    mensagenserro:
                      - "O pedido não está aguardando confirmação."
                    codigoretorno: 400
                    id: "00000000-0000-0000-0000-000000000000"
                    data: []
                no_pending_charges:
                  summary: Nenhuma cobrança pendente
                  value:
                    mensagem: "Um erro inesperado acabou de acontecer."
                    erro: true
                    mensagenserro:
                      - "Nenhuma cobrança pendente foi encontrada para este pedido."
                    codigoretorno: 400
                    id: "00000000-0000-0000-0000-000000000000"
                    data: []
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/orders/{order_code}/confirmations/{confirmation_id}/resend:
    post:
      tags: [Pedidos]
      summary: Reenviar confirmação do pedido
      description: >
        Reenvia o código de confirmação para o cliente (novo OTP por SMS/email).
        Invalidar confirmações pendentes anteriores e gera um novo código com validade de 15 minutos.
        Esta rota não aceita body.
      operationId: resendOrderConfirmation
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
        - name: order_code
          in: path
          required: true
          description: Código único do pedido
          schema:
            type: string
            example: "ord_abc123xyz"
        - name: confirmation_id
          in: path
          required: true
          description: ID (UUID) da confirmação
          schema:
            type: string
            format: uuid
            example: "d5e6f7a8-b9c0-1234-5678-abcdef012345"
      responses:
        '201':
          description: Confirmação reenviada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              example:
                mensagem: "Confirmação reenviada com sucesso."
                erro: false
                mensagenserro: []
                codigoretorno: 201
                id: "d5e6f7a8-b9c0-1234-5678-abcdef012345"
                data: []
        '401':
