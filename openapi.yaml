openapi: 3.1.0
info:
  title: 4Selet Pay API
  description: >
    API de processamento de pagamentos da plataforma 4Selet Pay.
    Suporta cobranças únicas, assinaturas recorrentes, PIX, Cartão de Crédito e PayPal.
    Todas as rotas autenticadas requerem um Bearer Token obtido via `/v1/login`.
  version: 1.0.0
  contact:
    name: 4Selet Pay
    email: suporte@4selet.com.br

servers:
  - url: https://hml.4selet-pay.com.br/api
    description: Servidor de Produção

security:
  - bearerAuth: []

tags:
  - name: Autenticação
    description: Rotas de autenticação e criação de usuários
  - name: Cobranças
    description: Criação, consulta, cancelamento e reembolso de cobranças
  - name: Pedidos
    description: Consulta de pedidos e gerenciamento de confirmações desafiadas
  - name: Assinaturas
    description: Criação e gerenciamento de assinaturas recorrentes
  - name: Faturas
    description: Gerenciamento de faturas e pagamento de faturas em atraso
  - name: Clientes Bloqueados
    description: Gerenciamento de lista negra de clientes
  - name: Contas
    description: Criação e gerenciamento de contas na plataforma
  - name: Aplicativo
    description: Endpoints para dashboard e uso via aplicativo mobile
  - name: Notificações Push
    description: Envio e gerenciamento de notificações push
  - name: Utilitários
    description: Endpoints utilitários como listagem de fusos horários
  - name: Gestão
    description: Relatórios gerenciais (acesso restrito a Super Admins)
  - name: Webhooks
    description: Endpoints para receber notificações de gateways de pagamento

paths:

  # ─────────────────────────────────────────────────────────────────
  # AUTENTICAÇÃO
  # ─────────────────────────────────────────────────────────────────

  /v1/check:
    get:
      tags: [Autenticação]
      summary: Verificar status da API
      description: Retorna uma mensagem confirmando que a API está em funcionamento. Útil para health checks.
      operationId: healthCheck
      security: []
      responses:
        '200':
          description: API em funcionamento
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: API is running
              example:
                message: API is running

  /v1/login:
    post:
      tags: [Autenticação]
      summary: Realizar login
      description: >
        Autentica o usuário com email e senha e retorna um Bearer Token para uso nas demais rotas.
        O token tem prazo de expiração informado na resposta.
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: usuario@exemplo.com.br
              password: "suaSenha123"
      responses:
        '200':
          description: Login realizado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              example:
                access_token: "eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiJ9..."
                token_type: Bearer
                expires_at: "2026-04-11T12:00:00.000000Z"
        '401':
          description: Credenciais inválidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                message: Invalid Credentials
        '422':
          $ref: '#/components/responses/ValidationError'

  /v1/login/{app}:
    post:
      tags: [Autenticação]
      summary: Realizar login com dados do usuário
      description: >
        Autentica o usuário e retorna, além do token, os dados completos do perfil do usuário.
        Variante do `/v1/login` usada pelo aplicativo mobile.
      operationId: loginWithUser
      security: []
      parameters:
        - name: app
          in: path
          required: true
          description: Qualquer valor (ex. `app`). A presença do parâmetro indica que os dados do usuário devem ser retornados.
          schema:
            type: string
            example: app
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: usuario@exemplo.com.br
              password: "suaSenha123"
      responses:
        '200':
          description: Login realizado com sucesso, incluindo dados do usuário
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/LoginResponse'
                  - type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/UserProfile'
              example:
                access_token: "eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiJ9..."
                token_type: Bearer
                expires_at: "2026-04-11T12:00:00.000000Z"
                user:
                  id: "usr_abc123"
                  name: "João Silva"
                  email: "joao@exemplo.com.br"
                  path_avatar: "https://sua-api.com/storage/avatars/joao.jpg"
                  admin_profile_id: null
                  preferences: {}
                  app_preferences: {}
        '401':
          description: Credenciais inválidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/new-user:
    post:
      tags: [Autenticação]
      summary: Criar novo usuário
      description: Cria um novo usuário na plataforma. Rota pública, não requer autenticação.
      operationId: createUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewUserRequest'
            example:
              name: "João Silva"
              email: "joao@exemplo.com.br"
              password: "suaSenha123"
              password_confirmation: "suaSenha123"
      responses:
        '200':
          description: Usuário criado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '422':
          $ref: '#/components/responses/ValidationError'

  # ─────────────────────────────────────────────────────────────────
  # COBRANÇAS
  # ─────────────────────────────────────────────────────────────────

  /v1/charge:
    post:
      tags: [Cobranças]
      summary: Criar cobrança
      description: >
        Cria uma nova cobrança (pedido de pagamento). Suporta os métodos de pagamento:
        **CreditCard**, **PIX** e **PayPal**.
        Requer o header `account` com o código da conta.
        Passa por validações de fraude, bloqueio de clientes e rate limiting.
      operationId: createCharge
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutRequest'
            examples:
              cartao_credito:
                summary: Pagamento com Cartão de Crédito
                value:
                  international: false
                  client:
                    name: "João Silva"
                    email: "joao@exemplo.com.br"
                    gender: "Male"
                    birthdate: "1990-01-15"
                    phone:
                      ddi: "55"
                      ddd: "11"
                      number: "999999999"
                    document:
                      type: "CPF"
                      number: "123.456.789-09"
                    address:
                      zipcode: "01310-100"
                      street: "Avenida Paulista"
                      number: 1000
                      neighborhood: "Bela Vista"
                      complement: "Apto 42"
                      city: "São Paulo"
                      state: "SP"
                      country: "Brasil"
                  payment:
                    type: CreditCard
                    card:
                      number: "4111111111111111"
                      name: "JOAO SILVA"
                      month: "12"
                      year: "27"
                      security_code: "123"
                      installments: 1
                      soft_descriptor: "MINHA LOJA"
                    conveniencefee: 0
                    conveniencefeeamount: 0
                  items:
                    - id: "produto_001"
                      description: "Camiseta Premium"
                      amount: 99.90
                      quantity: 2
                  type: "Online"
                  cycletype: "Unique"
              pix:
                summary: Pagamento com PIX
                value:
                  international: false
                  client:
                    name: "Maria Santos"
                    email: "maria@exemplo.com.br"
                    phone:
                      ddi: "55"
                      ddd: "21"
                      number: "988887777"
                    document:
                      type: "CPF"
                      number: "987.654.321-00"
                  payment:
                    type: PIX
                    pix_expiration: 3600
                  items:
                    - id: "curso_001"
                      description: "Curso Online"
                      amount: 297.00
                      quantity: 1
      responses:
        '200':
          description: Cobrança criada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChargeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/ServerError'

    get:
      tags: [Cobranças]
      summary: Listar cobranças
      description: >
        Retorna a lista paginada de cobranças da conta informada no header `account`.
      operationId: listCharges
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
        - name: page
          in: query
          required: false
          description: Número da página
          schema:
            type: integer
            default: 1
            example: 1
        - name: per_page
          in: query
          required: false
          description: Quantidade de itens por página (máximo 100)
          schema:
            type: integer
            default: 15
            example: 15
        - name: status
          in: query
          required: false
          description: Filtrar por status da cobrança
          schema:
            type: string
            enum: [Pending, Challenged, Approved, Declined, Refunded, Canceled]
            example: Approved
        - name: start_date
          in: query
          required: false
          description: Data inicial do filtro (formato Y-m-d)
          schema:
            type: string
            format: date
            example: "2026-01-01"
        - name: end_date
          in: query
          required: false
          description: Data final do filtro (formato Y-m-d)
          schema:
            type: string
            format: date
            example: "2026-03-31"
      responses:
        '200':
          description: Lista de cobranças retornada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedChargesResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/charge/{code}:
    get:
      tags: [Cobranças]
      summary: Consultar cobrança
      description: Retorna os detalhes completos de uma cobrança específica pelo seu código.
      operationId: getCharge
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
        - name: code
          in: path
          required: true
          description: Código único da cobrança
          schema:
            type: string
            example: "ord_abc123xyz"
      responses:
        '200':
          description: Dados da cobrança retornados com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChargeDetailResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/charge/cancel/{code}:
    post:
      tags: [Cobranças]
      summary: Cancelar cobrança
      description: Cancela uma cobrança existente que ainda não foi finalizada.
      operationId: cancelCharge
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
        - name: code
          in: path
          required: true
          description: Código único da cobrança a ser cancelada
          schema:
            type: string
            example: "ord_abc123xyz"
      responses:
        '200':
          description: Cobrança cancelada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              example:
                success: true
                message: Cobrança cancelada com sucesso
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/charge/refund/{code}:
    post:
      tags: [Cobranças]
      summary: Estornar cobrança
      description: >
        Realiza o estorno (reembolso) de uma cobrança aprovada.
        O campo `value` no body é opcional; se não informado, o estorno é total.
      operationId: refundCharge
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
        - name: code
          in: path
          required: true
          description: Código único da cobrança a ser estornada
          schema:
            type: string
            example: "ord_abc123xyz"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                value:
                  type: number
                  format: float
                  description: Valor a ser estornado (opcional). Se omitido, o estorno é total.
                  example: 50.00
            example:
              value: 50.00
      responses:
        '200':
          description: Estorno realizado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ─────────────────────────────────────────────────────────────────
  # PEDIDOS
  # ─────────────────────────────────────────────────────────────────

  /v1/orders/{order_code}/confirmations:
    get:
      tags: [Pedidos]
      summary: Listar confirmações do pedido
      description: >
        Retorna a lista de confirmações (desafios de segurança) associadas a um pedido.
        Usado quando um pedido entra no status **Challenged** e requer verificação adicional (ex: 3D Secure, OTP).
      operationId: getOrderConfirmations
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
        - name: order_code
          in: path
          required: true
          description: Código único do pedido
          schema:
            type: string
            example: "ord_abc123xyz"
      responses:
        '200':
          description: Lista de confirmações retornada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderConfirmationsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/orders/{order_code}/confirmations/{confirmation_id}/verify:
    post:
      tags: [Pedidos]
      summary: Verificar confirmação do pedido
      description: >
        Verifica/valida uma confirmação de pedido desafiado.
        O cliente deve submeter o código recebido (ex: OTP via SMS/email) para desbloquear o pedido.
      operationId: verifyOrderConfirmation
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
        - name: order_code
          in: path
          required: true
          description: Código único do pedido
          schema:
            type: string
            example: "ord_abc123xyz"
        - name: confirmation_id
          in: path
          required: true
          description: ID da confirmação a ser verificada
          schema:
            type: string
            example: "conf_xyz789"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                  description: Código de verificação recebido pelo cliente (OTP, 3DS, etc.)
                  example: "123456"
            example:
              code: "123456"
      responses:
        '200':
          description: Confirmação verificada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/orders/{order_code}/confirmations/{confirmation_id}/resend:
    post:
      tags: [Pedidos]
      summary: Reenviar confirmação do pedido
      description: Reenvia o código de confirmação para o cliente (ex: novo OTP por SMS/email).
      operationId: resendOrderConfirmation
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
        - name: order_code
          in: path
          required: true
          description: Código único do pedido
          schema:
            type: string
            example: "ord_abc123xyz"
        - name: confirmation_id
          in: path
          required: true
          description: ID da confirmação
          schema:
            type: string
            example: "conf_xyz789"
      responses:
        '200':
          description: Confirmação reenviada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ─────────────────────────────────────────────────────────────────
  # ASSINATURAS
  # ─────────────────────────────────────────────────────────────────

  /v1/subscriptions:
    post:
      tags: [Assinaturas]
      summary: Criar assinatura
      description: >
        Cria uma nova assinatura recorrente para um cliente. Suporta os métodos de pagamento:
        **CreditCard** e **PIX**.
        O campo `subscription.interval` define o ciclo em dias (ex: 30 para mensal).
        Requer o header `account` com o código da conta.
        Passa por validações de fraude, bloqueio de clientes e rate limiting.
      operationId: createSubscription
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreSubscriptionRequest'
            example:
              international: false
              client:
                client_ip: "192.168.1.100"
                name: "Carlos Ferreira"
                email: "carlos@exemplo.com.br"
                gender: "Male"
                birthdate: "1985-06-20"
                phone:
                  ddi: 55
                  ddd: 11
                  number: "977776666"
                document:
                  type: "CPF"
                  number: "111.222.333-44"
                address:
                  zipcode: "04538-132"
                  street: "Rua Fidêncio Ramos"
                  number: 302
                  neighborhood: "Vila Olímpia"
                  complement: "Torre B"
                  city: "São Paulo"
                  state: "SP"
                  country: "Brasil"
              subscription:
                interval: 30
                code: "plano_mensal_001"
                description: "Plano Mensal Premium"
                installments: 1
                max_invoices: 12
                minimum_price: 9990
                billing_type: "prepaid"
                discounts:
                  cycles: 1
                  value: 10.0
                  type: "percentage"
                metadata:
                  origem: "site"
              payment:
                type: CreditCard
                card:
                  number: "4111111111111111"
                  name: "CARLOS FERREIRA"
                  month: "08"
                  year: "28"
                  security_code: "456"
              items:
                - id: "plano_premium"
                  description: "Acesso Premium Mensal"
                  amount: 99.90
                  quantity: 1
      responses:
        '200':
          description: Assinatura criada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  /v1/subscriptions/cancel/{subscription_code}:
    put:
      tags: [Assinaturas]
      summary: Cancelar assinatura
      description: Cancela uma assinatura ativa. A assinatura não será renovada na próxima data de cobrança.
      operationId: cancelSubscription
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
        - name: subscription_code
          in: path
          required: true
          description: Código único da assinatura
          schema:
            type: string
            example: "sub_abc123"
      responses:
        '200':
          description: Assinatura cancelada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/subscriptions/change-card/{subscription_code}:
    put:
      tags: [Assinaturas]
      summary: Alterar cartão da assinatura
      description: Substitui o cartão de crédito vinculado a uma assinatura existente.
      operationId: changeSubscriptionCard
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
        - name: subscription_code
          in: path
          required: true
          description: Código único da assinatura
          schema:
            type: string
            example: "sub_abc123"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeCardRequest'
            example:
              name: "CARLOS FERREIRA"
              number: "5500000000000004"
              month: "09"
              year: "29"
              security_code: "789"
      responses:
        '200':
          description: Cartão alterado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/subscriptions/change-payment-method/{subscription_code}:
    put:
      tags: [Assinaturas]
      summary: Alterar método de pagamento da assinatura
      description: >
        Altera o método de pagamento de uma assinatura. Ao mudar para `CreditCard`,
        os dados do novo cartão devem ser informados no objeto `card`.
      operationId: changeSubscriptionPaymentMethod
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
        - name: subscription_code
          in: path
          required: true
          description: Código único da assinatura
          schema:
            type: string
            example: "sub_abc123"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePaymentMethodRequest'
            examples:
              para_pix:
                summary: Mudar para PIX
                value:
                  method: PIX
              para_cartao:
                summary: Mudar para Cartão de Crédito
                value:
                  method: CreditCard
                  card:
                    name: "CARLOS FERREIRA"
                    number: "4111111111111111"
                    month: "12"
                    year: "28"
                    security_code: "321"
      responses:
        '200':
          description: Método de pagamento alterado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/subscriptions/{subscription_code}/invoices:
    get:
      tags: [Assinaturas]
      summary: Listar faturas da assinatura
      description: Retorna as faturas geradas para uma assinatura, com suporte a filtro por status e limite de itens.
      operationId: listSubscriptionInvoices
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
        - name: subscription_code
          in: path
          required: true
          description: Código único da assinatura
          schema:
            type: string
            example: "sub_abc123"
        - name: status
          in: query
          required: false
          description: Filtrar faturas por status
          schema:
            type: string
            enum: [Pending, Challenged, Approved, Declined, Refunded, Canceled]
            example: Pending
        - name: limit
          in: query
          required: false
          description: Quantidade máxima de faturas a retornar (1-100)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            example: 20
      responses:
        '200':
