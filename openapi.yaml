        - name: per_page
          in: query
          required: false
          schema:
            type: integer
            default: 15
        - name: status
          in: query
          required: false
          description: Filtrar por status do pedido
          schema:
            type: string
            enum: [Pending, Challenged, Approved, Declined, Refunded, Canceled]
