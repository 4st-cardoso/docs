  /v1/subscriptions/{subscription_code}/invoices:
    get:
      tags: [Assinaturas]
      summary: Listar faturas da assinatura
      description: >
        Retorna as faturas (pedidos) geradas para uma assinatura, com suporte a filtro por status e limite.
        Cada fatura inclui seus itens e cobranças associadas.
        Os valores monetários são retornados em centavos.
        Esta rota NÃO retorna o envelope APIReturnUtil; retorna diretamente `{"data": [...]}`.
      operationId: listSubscriptionInvoices
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
        - name: subscription_code
          in: path
          required: true
          description: Código único da assinatura
          schema:
            type: string
            example: "sub_abc123"
        - name: status
          in: query
          required: false
          description: Filtrar faturas por status (StatusOrder)
          schema:
            type: string
            enum: [New, Canceled, Paid, ChargeBack, Reversed, PartialReversed, Reproved, Pending, Fail, Challenged, Unprocessed]
            example: Paid
        - name: limit
          in: query
          required: false
          description: Quantidade máxima de faturas a retornar (1-100)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            example: 20
      responses:
        '200':
          description: Lista de faturas retornada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoicesListResponse'
              example:
                data:
                  - subscription_code: "sub_abc123"
                    code: "ord_xyz456"
                    status: "Paid"
                    amount: 9990
                    attempts: 1
                    created_at: "2026-03-11T10:00:00.000000Z"
                    items:
                      - id: "item_abc123"
                        unitary_amount: 9990
                        quantity: 1
                        code: "plano_premium"
                        name: "Acesso Premium Mensal"
                    charges:
                      - code: "chg_abc123"
                        status: "Paid"
                        amount: 9990
                        payment_type: "CreditCard"
                        installments: 1
                        account_client_card_id: "card_abc123"
