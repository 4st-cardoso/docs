          description: Data final do relatório (formato Y-m-d, deve ser maior ou igual a start_date)
          schema:
            type: string
            format: date
            example: "2026-03-31"
        - name: page
          in: query
          required: false
          description: Número da página
          schema:
            type: integer
            minimum: 1
            example: 1
        - name: per_page
          in: query
          required: false
          description: Quantidade de itens por página (máximo 100)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            example: 25
      responses:
        '200':
          description: Relatório de vendas retornado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SalesReportResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Acesso negado — apenas Super Admins
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

